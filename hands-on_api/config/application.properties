# Application Properties ============================================
spring.application.name=Mam-ngu-qua


# Server Configuration ============================================
server.port=6969


# Database Configuration ============================================
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=HSF302;encrypt=true;trustServerCertificate=true
# Credentials hardcoded - consider using environment variables for production
spring.datasource.username=sa
spring.datasource.password=sa123456
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver


# JPA/Hibernate Configuration ============================================
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# Data Serialization Mode ============================================
spring.data.web.pageable.serialization-mode=via_dto


# JWT Configuration ============================================
# Secret key du`ng -de^? ky' JWT tokens (to^'i thie^?u 256 bits >= 32 ky' tu*. cho HS256)
jwt.secret=mamnguqua-fruit-management-system-secret-key
# Token expiration: 24 hours (86.400.000 milliseconds)
jwt.expiration=86400000


# CORS Configuration ============================================
# Cho phe'p requests t?*` frontend (thay the^' localhost:xxxx vo*'i domain thu*.c te^' khi deploy)
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:8080
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true


# Swagger/OpenAPI Configuration ============================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs


# Logging Configuration ============================================
logging.level.com.giaolang.mamnguqua=DEBUG
logging.level.org.springframework.security=INFO
