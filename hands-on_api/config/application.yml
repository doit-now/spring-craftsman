# Application Properties ============================================
spring:
  application:
    name: Mam-ngu-qua


  # Database Configuration ============================================
  datasource:
    url: jdbc:sqlserver://localhost:1433;databaseName=HSF302;encrypt=true;trustServerCertificate=true
    # Credentials hardcoded - consider using environment variables for production
    username: sa
    password: sa123456
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  # JPA/Hibernate Configuration ============================================
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Data Serialization Mode ============================================
  data:
    web:
      pageable:
        serialization-mode: via_dto

  # CORS Configuration ============================================
  # Cho phe'p requests tu+` frontend (thay the^' localhost:xxxx vo+'i domain thu+.c te^' khi deploy)
  web:
    cors:
      allowed-origins: http://localhost:3000,http://localhost:8080
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true


# Server Configuration ============================================
server:
  port: 6969


# JWT Configuration ============================================
# Secret key du`ng -de^? ky' JWT tokens (to^'i thie^?u 256 bits >= 32 ky' tu+. cho HS256)
jwt:
  secret: mamnguqua-fruit-management-system-secret-key
  # Token expiration: 24 hours (86.400.000 milliseconds)
  expiration: 86400000


# Swagger/OpenAPI Configuration ============================================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs


# Logging Configuration ============================================
logging:
  level:
    com.giaolang.mamnguqua: DEBUG
    org.springframework.security: INFO
