# Application Properties ============================================
spring.application.name=Mam-ngu-qua


# Database Configuration ============================================
# H2 la` DB nhu'ng trong RAM, ko ca^`n ca`i -da(.t rie^ng, kho*?i cha.y cu`ng lu'c run app
# Du`ng cho dev/test — du*~ liê.u ma^'t khi restart app
# Ne^'u muo^'n lu*u ra file (ko ma^'t khi restart app):
# spring.datasource.url=jdbc:h2:file:./data/mamnguqua

spring.datasource.url=jdbc:h2:mem:mamnguqua
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver


# BEGIN OF JPA/Hibernate Configuration ============================================
# create-drop: ta.o ba?ng khi start, xo'a khi stop
# Ca'c gia' tri. kha'c:
# create   : ta.o mo'i mo^~i la^`n start (xo'a data cu~)
# update   : giu*` data cu~, chi? the^m pha^`thay -do^?
# validate : chi? kie^?m tra, ko su*?a gi`
# none     : không làm gì
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect


# H2 Console — giao diê.n web -de^? xem database tru*.c tie^'p tre^n browser ============
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Truy ca^.p ta.i: http://localhost:6969/h2-console
# -Die^`n va`o console: JDBC URL = jdbc:h2:mem:mamnguqua, username = sa, password = (tro^'ng)
# END OF JPA/Hibernate Configuration ============================================


# Data Serialization Mode ============================================
spring.data.web.pageable.serialization-mode=via_dto


# Server Configuration ============================================
server.port=6969


# JWT Configuration ============================================
# Secret key du`ng -de^? ky' JWT tokens (to^'i thie^?u 256 bits >= 32 ky' tu*. cho HS256)
jwt.secret=mamnguqua-fruit-management-system-secret-key
# Token expiration: 24 hours (86.400.000 milliseconds)
jwt.expiration=86400000


# CORS Configuration ============================================
# Cho phe'p requests t?*` frontend (thay the^' localhost:xxxx vo*'i domain thu*.c te^' khi deploy)
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:8080
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true


# Swagger/OpenAPI Configuration ============================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs


# Logging Configuration ============================================
logging.level.com.giaolang.mamnguqua=DEBUG
logging.level.org.springframework.security=INFO
