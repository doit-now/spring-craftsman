# ================================================================
#  API GATEWAY - Spring Boot 4.x + Spring Cloud Gateway MVC 5.x
#  (Phiên bản .properties - tương đương với application.yaml)
# ================================================================

# Tên service, hiển thị trong log và Actuator
spring.application.name=api-gateway

# ------ ROUTE 1: Order Service ------
# Tên định danh route (tùy đặt, không trùng nhau) - dùng [0] cho route đầu tiên
spring.cloud.gateway.server.webmvc.routes[0].id=order-route

# Địa chỉ thật của service cần forward tới
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:6969

# Khi request khớp path này thì kích hoạt route
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/v8/orders/**

# ------ ROUTE 2: User Service ------
spring.cloud.gateway.server.webmvc.routes[1].id=user-route
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:6789
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/v8/users/**

# ================================================================
#  ACTUATOR - Endpoint quản trị, giám sát Gateway
#  Truy cập: GET /actuator/health
#             GET /actuator/gateway/mvc/routes
# ================================================================
management.endpoints.web.exposure.include=health,gateway

# ================================================================
#  SERVER
#  Cổng Gateway lắng nghe - client gọi vào đây
# ================================================================
server.port=2204
